<!doctype html>
<html class="dark" lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summer Dash - Avalanche Game</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0df259",
            "secondary": "#111813",
            "background-light": "#ffffff",
            "background-dark": "#121216",
            "accent-gray": "#f3f4f6",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"],
            "body": ["Noto Sans", "sans-serif"],
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "full": "9999px" },
          backgroundImage: {
            'pixel-pattern': "url(\"data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000000' fill-opacity='0.05' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E\")",
          }
        },
      },
    }
  </script>
  <style>
    .pathway-dashed {
      background-image: linear-gradient(to bottom, #0df259 50%, transparent 50%);
      background-size: 4px 20px;
      background-repeat: repeat-y;
    }

    .pixel-shadow {
      box-shadow: 4px 4px 0px 0px #111813;
    }

    .pixel-shadow-hover:hover {
      box-shadow: 6px 6px 0px 0px #0df259;
      transform: translate(-2px, -2px);
    }

    .pixel-corners {
      clip-path: polygon(0px 8px, 4px 8px, 4px 4px, 8px 4px, 8px 0px,
          calc(100% - 8px) 0px, calc(100% - 8px) 4px, calc(100% - 4px) 4px, calc(100% - 4px) 8px, 100% 8px,
          100% calc(100% - 8px), calc(100% - 4px) calc(100% - 8px), calc(100% - 4px) calc(100% - 4px), calc(100% - 8px) calc(100% - 4px), calc(100% - 8px) 100%,
          8px 100%, 8px calc(100% - 4px), 4px calc(100% - 4px), 4px calc(100% - 8px), 0px calc(100% - 8px));
    }

    /* Custom Scrollbar from previous design - kept for consistency if needed, but updated colors */
    ::-webkit-scrollbar {
      width: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #111813;
    }

    ::-webkit-scrollbar-thumb {
      background: #0df259;
      border: 2px solid #111813;
    }

    img,
    canvas {
      image-rendering: pixelated;
      /* Ensure crisp pixel art */
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
